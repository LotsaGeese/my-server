  moodle_db:
    image: docker.io/bitnami/mariadb:latest
    container_name: moodle_db_test
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=bn_moodle
      - MARIADB_PASSWORD=bitnami
      - MARIADB_DATABASE=bitnami_moodle
    restart: unless-stopped
    volumes:
      - mariadb_data:/bitnami/mariadb
      - ./moodle/my_custom.cnf:/opt/bitnami/mariadb/conf/my_custom.cnf

  moodle:
    image: docker.io/bitnami/moodle:latest
    container_name: moodle_test
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MOODLE_DATABASE_USER=bn_moodle
      - MOODLE_DATABASE_PASSWORD=bitnami
      - MOODLE_DATABASE_NAME=bitnami_moodle
      - MOODLE_DATABASE_HOST=moodle_db
      - BITNAMI_DEBUG=true   
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=Admin123!
      - MOODLE_REVERSEPROXY=yes
      - MOODLE_SSLPROXY=yes
      - MOODLE_HOST=moodle.hippity.internal:443
    depends_on:
      - moodle_db
    ports:
      - 8080:8080
      - 8443:8443

    # entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata



volumes:
  moodle_data:       # Moodle data
  moodledata_data:
  mariadb_data:

  moodle_db_data:    # Database storage
