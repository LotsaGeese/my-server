services:

  dns:
    image: my-server-dns
    #build: #Use this if its needed to rebuild the image, however a connection to the wifi is needed that doesn't route through this dns
    #  context: .
    #  dockerfile: ./DNS/DockerfileDNS
    container_name: dns_test
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    networks:
      dns_net:
        ipv4_address: ${DNS_IP}
    healthcheck:
      test: ["CMD", "nslookup", "hippity.internal", "127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - URL=${DOMAIN}
      - VALIDATION=manual
    volumes:
      - ./proxy/data:/config
    ports:
      - 443:443
      - 80:80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal


  kolibri:
    build:
      context: ./kolibri
      dockerfile: Dockerfilekolibri
    container_name: kolibri_test
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - kolibri_data:/kolibri/.kolibri
      - /mnt/usb-drives:/mnt/usb-drives:slave
    privileged: true
    networks:
      - internal

  kiwix:
    build:
      context: ./kiwix
      dockerfile: Dockerfilekiwix
    container_name: kiwix_test
    restart: unless-stopped
    volumes:
      - kiwix_data:/data:ro #this only needs to be read only
    command:
      - '*.zim'
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  moodle_db:
    image: docker.io/bitnami/mariadb:latest
    container_name: moodle_db_test
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
    restart: unless-stopped
    volumes:
      - mariadb_data:/bitnami/mariadb
      - ./moodle/my_custom.cnf:/opt/bitnami/mariadb/conf/my_custom.cnf
    healthcheck:
      test: ["CMD", "/opt/bitnami/mariadb/bin/mariadb-admin", "ping", "-u", "bn_moodle", "-pbitnami", "-h", "127.0.0.1", "--ssl=FALSE"]
      interval: 15s
      timeout: 5s
      retries: 6
    networks:
      - internal

  moodle:
    image: docker.io/bitnami/moodle:latest
    container_name: moodle_test
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - MOODLE_DATABASE_USER=${MARIADB_USER}
      - MOODLE_DATABASE_PASSWORD=${MARIADB_PASSWORD}
      - MOODLE_DATABASE_NAME=${MARIADB_DATABASE}
      - MOODLE_DATABASE_HOST=moodle_db
      - BITNAMI_DEBUG=true
      - MOODLE_USERNAME=${MOODLE_USERNAME}
      - MOODLE_PASSWORD=${MOODLE_PASSWORD}
      - MOODLE_REVERSEPROXY=yes
      - MOODLE_SSLPROXY=yes
      - MOODLE_HOST=${MOODLE_HOST}
    healthcheck:
      test: ["CMD", "php", "/opt/bitnami/moodle/admin/cli/checks.php"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 300s
    depends_on:
      - moodle_db
    networks:
      - internal
    volumes:
      - moodle_data:/bitnami/moodle
      - moodledata_data:/bitnami/moodledata
      - /mnt/usb-drives:/mnt/usb-drives:slave

  filebrowser:
    image: filebrowser/filebrowser:s6
    container_name: filebrowser
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - filebrowser_data:/srv
      - filebrowser_db:/database
      - filebrowser_config:/config        #
      - ./filebrowser/init-users.sh:/custom-cont-init.d/99-init-users.sh
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - FB_ADMIN_PASSWORD=${FB_ADMIN_PASSWORD}
      - FB_STUDENT_PASSWORD=${FB_STUDENT_PASSWORD}

volumes:
  kiwix_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/kiwix

  kolibri_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/kolibri

  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/mariadb

  moodle_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/moodle

  moodledata_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/moodledata

  filebrowser_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/filebrowser/srv

  filebrowser_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/filebrowser/db
  
  filebrowser_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH}/filebrowser/config

networks:
  dns_net:
    driver: macvlan
    driver_opts:
      parent: ${PARENT_INTERFACE}
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}
          ip_range: ${IP_RANGE}
  internal:
    driver: bridge