<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hippity.internal</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0f0f;
            --surface: #161818;
            --border: #252828;
            --text: #e8e4dc;
            --muted: #6b6b6b;
            --accent-moodle: #f97316;
            --accent-kiwix: #22c55e;
            --accent-kolibri: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
        }

        header {
            margin-bottom: 4rem;
            animation: fadeUp 0.6s ease both;
        }

        .eyebrow {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            line-height: 1.1;
            color: var(--text);
        }

        h1 em {
            font-style: italic;
            font-weight: 300;
        }

        .subtitle {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .apps {
            display: flex;
            flex-direction: column;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .app-card {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.75rem 2rem;
            background: var(--surface);
            text-decoration: none;
            color: var(--text);
            transition: background 0.15s ease;
            position: relative;
            animation: fadeUp 0.6s ease both;
        }

        .app-card:nth-child(1) { animation-delay: 0.1s; }
        .app-card:nth-child(2) { animation-delay: 0.2s; }
        .app-card:nth-child(3) { animation-delay: 0.3s; }

        .app-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .app-card:hover {
            background: #1c1e1e;
        }

        .app-card:hover::before {
            opacity: 1;
        }

        .app-card:hover .arrow {
            transform: translateX(4px);
            opacity: 1;
        }

        .app-card[data-accent="moodle"] { --accent: var(--accent-moodle); }
        .app-card[data-accent="kiwix"]  { --accent: var(--accent-kiwix); }
        .app-card[data-accent="kolibri"]{ --accent: var(--accent-kolibri); }

        .icon {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
            background: color-mix(in srgb, var(--accent) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
            color: var(--accent);
        }

        .app-info {
            flex: 1;
        }

        .app-name {
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            margin-bottom: 0.25rem;
        }

        .app-desc {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.03em;
        }

        .app-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .tag {
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            border-radius: 2px;
            background: color-mix(in srgb, var(--accent) 10%, transparent);
            color: var(--accent);
            border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
        }

        .arrow {
            font-size: 0.8rem;
            color: var(--muted);
            opacity: 0.4;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: fadeUp 0.6s 0.4s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="eyebrow">hippity.internal</p>
            <h1>Your <em>local</em><br>server.</h1>
            <p class="subtitle">// select an application to continue</p>
        </header>

        <div class="apps">
            <a href="https://moodle.hippity.internal" class="app-card" data-accent="moodle">
                <div class="icon">🎓</div>
                <div class="app-info">
                    <div class="app-name">Moodle</div>
                    <div class="app-desc">Learning management system</div>
                </div>
                <div class="app-meta">
                    <span class="tag">LMS</span>
                    <span class="arrow">→</span>
                </div>
            </a>

            <a href="https://kiwix.hippity.internal" class="app-card" data-accent="kiwix">
                <div class="icon">📚</div>
                <div class="app-info">
                    <div class="app-name">Kiwix</div>
                    <div class="app-desc">Offline knowledge library</div>
                </div>
                <div class="app-meta">
                    <span class="tag">Library</span>
                    <span class="arrow">→</span>
                </div>
            </a>

            <a href="https://kolibri.hippity.internal" class="app-card" data-accent="kolibri">
                <div class="icon">🌱</div>
                <div class="app-info">
                    <div class="app-name">Kolibri</div>
                    <div class="app-desc">Educational platform for offline learning</div>
                </div>
                <div class="app-meta">
                    <span class="tag">Education</span>
                    <span class="arrow">→</span>
                </div>
            </a>
        </div>

        <footer>local network only &nbsp;·&nbsp; powered by swag</footer>
    </div>
</body>
</html>
