# Local hostname resolution
address=/hippity.internal/192.168.0.210

# Local domains - don't forward to upstream
local=/hippity.internal/

# Forward everything else to Google DNS
server=8.8.8.8
server=1.1.1.1

# Do not read /etc/resolv.conf
no-resolv

# Log all queries for testing
log-queries
log-facility=/var/log/dnsmasq.log